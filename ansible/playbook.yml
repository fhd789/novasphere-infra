---
- name: Configuration du serveur web NovaSphere
  hosts: webservers
  become: true

  tasks:
    - name: Mettre à jour le cache APT
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Installer Nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: S'assurer que Nginx est démarré et activé
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Déployer la page d'accueil NovaSphere
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>NovaSphere</title></head>
          <body>
          <h1>Bienvenue sur NovaSphere</h1>
          <p>Serveur configuré automatiquement par Ansible.</p>
          <p>Environnement : dev | Version : 3.0</p>
          </body>
          </html>
        owner: www-data
        group: www-data
        mode: "0644"
      notify: Redémarrer Nginx

  handlers:
    - name: Redémarrer Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
